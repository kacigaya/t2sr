# =====================================================================
# Nginx — site TanStack Start SSR (t2sr.fr)
# Reverse proxy vers le serveur web local.
# =====================================================================

server {
    listen 80;
    listen [::]:80;
    server_name t2sr.fr www.t2sr.fr;

    # Redirige tout le trafic HTTP vers HTTPS.
    return 301 https://t2sr.fr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.t2sr.fr;

    ssl_certificate     /etc/letsencrypt/live/t2sr.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/t2sr.fr/privkey.pem;

    # Redirige www vers le domaine nu.
    return 301 https://t2sr.fr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name t2sr.fr;

    # --- SSL (Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/t2sr.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/t2sr.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # --- En-têtes de sécurité ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Compression ---
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/wasm;

    # Brotli si le module est disponible (décommenter après installation).
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json
    #              image/svg+xml application/xml;

    # --- Cache long pour les assets versionnés ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        proxy_pass http://127.0.0.1:4321;
    }

    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        proxy_pass http://127.0.0.1:4321;
    }

    # --- SSR TanStack Start ---
    location / {
        add_header Cache-Control "no-cache";
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
