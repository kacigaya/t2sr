# =====================================================================
# Nginx — site statique Astro (t2sr.fr)
# Sert uniquement les fichiers statiques du dossier dist/.
# =====================================================================

server {
    listen 80;
    listen [::]:80;
    server_name t2sr.fr www.t2sr.fr;

    # Redirige tout le trafic HTTP vers HTTPS.
    return 301 https://t2sr.fr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.t2sr.fr;

    ssl_certificate     /etc/letsencrypt/live/t2sr.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/t2sr.fr/privkey.pem;

    # Redirige www vers le domaine nu.
    return 301 https://t2sr.fr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name t2sr.fr;

    # --- Chemin du build Astro (dossier dist copié sur le serveur) ---
    root /var/www/t2sr/dist;
    index index.html;

    # --- SSL (Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/t2sr.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/t2sr.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # --- En-têtes de sécurité ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Compression ---
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/wasm;

    # Brotli si le module est disponible (décommenter après installation).
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json
    #              image/svg+xml application/xml;

    # --- Cache long pour les assets versionnés ---
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|webp|avif|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- Pas de cache agressif sur le HTML ---
    location / {
        try_files $uri $uri/ $uri.html /404.html;
        add_header Cache-Control "no-cache";
    }

    error_page 404 /404.html;
}
