# =====================================================================
# Nginx — reverse proxy API Hono (api.t2sr.fr -> 127.0.0.1:8787)
# =====================================================================

server {
    listen 80;
    listen [::]:80;
    server_name api.t2sr.fr;
    return 301 https://api.t2sr.fr$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.t2sr.fr;

    ssl_certificate     /etc/letsencrypt/live/api.t2sr.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.t2sr.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Taille max du corps (uploads: 5 fichiers x 5 Mo + marge).
    client_max_body_size 30m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
